name: Validate Repository

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python scripts
        run: python -m compileall scripts
      - name: Validate Skill
        run: python scripts/validate_skill.py .claude/skills/claude-fable-method-orchestrator
      - name: Package Skill
        run: python scripts/package_skill.py
      - name: Check repository consistency
        run: python scripts/check_repo.py
      - name: Upload packaged Skill artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-fable-method-orchestrator-skill
          path: dist/claude-fable-method-orchestrator-skill.zip

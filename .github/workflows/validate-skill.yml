name: Validate Skill

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/validate_skill.py .claude/skills/claude-fable-5-clone
      - run: python scripts/package_skill.py

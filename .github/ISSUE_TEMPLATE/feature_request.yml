name: Feature request
description: Suggest a safe improvement to the Skill, docs, scripts, or evals.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Skill
        - Claude Code subagent
        - Documentation
        - Evals
        - Scripts
        - GitHub Actions
        - Examples
    validations:
      required: true

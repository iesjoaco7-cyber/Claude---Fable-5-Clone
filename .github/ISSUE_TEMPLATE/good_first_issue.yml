name: Good first issue
description: Small scoped contribution suitable for a first external contributor.
title: "good first issue: "
labels: ["good first issue", "help wanted"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What needs to be changed?
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Suggested files
      description: List the files likely involved.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: "- [ ] ..."
    validations:
      required: true
